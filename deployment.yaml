apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello-app
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: hello-app
  template:
    metadata:
      labels:
        app: hello-app
    spec:
      containers:
      - name: hello-app
        image: ghcr.io/terry620033/hello-app:dd4213f81f5ec836b55ebfe182275f3c5daa7d54
        ports:
        - containerPort: 5000
