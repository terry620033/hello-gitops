apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello-app
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: hello-app
  template:
    metadata:
      labels:
        app: hello-app
    spec:
      containers:
      - name: hello-app
        image: ghcr.io/terry620033/hello-app:d6b7c4f2c0abae826b231288970e094eaf1ae90e
        ports:
        - containerPort: 5000
