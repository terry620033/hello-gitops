apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello-app
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: hello-app
  template:
    metadata:
      labels:
        app: hello-app
    spec:
      containers:
      - name: hello-app
        image: ghcr.io/terry620033/hello-app:ae2e85b77b7586e6a0fe48ef2870768b56b903fd
        ports:
        - containerPort: 5000
